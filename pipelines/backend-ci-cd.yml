trigger:
  branches:
    include:
      - your-backend-branch-name

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.11'

- script: |
    cd backend
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: Install Python dependencies

- script: |
    cd backend
    pytest
  displayName: Run backend tests
