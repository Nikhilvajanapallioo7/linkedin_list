trigger: none

pr: none

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.11'
  displayName: Use Python 3.11

- script: |
    python --version
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: Install dependencies

- script: |
    python -c "import app.main; print('Backend is working')"
  displayName: Verify backend app import
